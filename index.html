<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>朋友圈文案生成器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #222; padding: 24px; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #444; }
  textarea {
    width: 100%; border: 1px solid #ddd; border-radius: 8px;
    padding: 12px; font-size: 14px; font-family: inherit;
    background: #fff; resize: vertical; outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: #555; }
  .field { margin-bottom: 16px; }
  .hint { font-size: 12px; color: #999; margin-top: 4px; }
  button {
    width: 100%; padding: 14px; background: #111; color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background 0.2s; margin-top: 4px;
  }
  button:hover { background: #333; }
  button:disabled { background: #999; cursor: not-allowed; }
  .output-section { margin-top: 32px; }
  .output-block {
    background: #fff; border: 1px solid #e0e0e0; border-radius: 10px;
    padding: 20px; margin-bottom: 16px;
  }
  .output-content {
    font-size: 14px; line-height: 1.8; color: #333;
    white-space: pre-wrap; word-break: break-word;
  }
  .copy-btn {
    width: auto; padding: 6px 14px; font-size: 12px; font-weight: 500;
    background: #f0f0f0; color: #333; border-radius: 6px; margin-top: 12px;
  }
  .copy-btn:hover { background: #e0e0e0; }
  .error { color: #c0392b; font-size: 13px; margin-top: 8px; }
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid #ccc; border-top-color: #333;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <h1>✍️ 朋友圈文案生成器</h1>
  <p class="subtitle">粘贴语音转文字内容，一键生成朋友圈文案</p>

  <div class="field">
    <label>语音转文字内容</label>
    <textarea id="voiceText" rows="10" placeholder="把语音转出来的原始文字粘贴进来，不用整理，越原始越好……"></textarea>
  </div>

  <button id="generateBtn" onclick="generate()">生成文案</button>
  <div id="error" class="error"></div>

  <div id="outputSection" class="output-section" style="display:none">
    <div class="output-block">
      <div class="output-content" id="outputAll"></div>
      <button class="copy-btn" onclick="copyAll(this)">复制全部内容</button>
    </div>
  </div>
</div>

<script>
const API_KEY = 'sk-s32x3JETsnsisEWG3e01Ee94B7Ba464fB7E830Fc41Ea2899';
const BASE_URL = 'https://new.pumpkinai.vip/v1/messages';

function buildPrompt(voiceText) {
  return `你是我的朋友圈文案助手。我会给你一段语音转文字的原始内容，里面有重复、跑题、口语填充词，没关系。

你的任务：从这段话里提炼出所有值得发的观点，按观点的犀利程度筛选，生成2-5条四段式朋友圈文案。观点不够犀利的不要写，宁少勿滥。

朋友圈不是日记，是私域内容。读者是潜在客户，他们在刷朋友圈的时候，你的内容要能让他们停下来、有感触、觉得这个人说的有道理，甚至想找你聊。所以每一条文案都要有用户视角：不是在记录我今天做了什么，而是在输出一个对读者有价值的观点或洞察，让他们觉得关注你是值得的。

【风格要求】
- 口语化，视觉上读起来流畅
- 长短句交替，有节奏感和韵律感。短句用来点题或收尾，长句用来铺陈和解释，不要全是短句也不要全是长句
- 自问自答的句式自然出现：为什么？因为……
- 就是、然后、哎呀、搞 这类词可以用，但不要堆，点到为止
- 结尾可以用反问收尾，有点个人立场，但不说教
- 举真实的生活细节，不举大道理
- 绝对禁止使用双引号
- 绝对禁止使用以下词汇和句式：稳稳接住、扛着、看见自己、疗愈、破防、共鸣、赋能、内耗、松弛感、钝感力、向内探索、与自己和解、任何XX的我句式、任何愿你XX句式

【格式】
- 输出里不要出现【观点】【原因】【案例】【总结】这些标签，也不要出现第1条第2条这类编号
- 每条内部按观点、原因、案例、总结的顺序写，但标签不显示
- 每段之间空一行，每条之间用 --- 分隔
- 整体长短根据语料决定，不要强行拉长也不要强行压缩
- 输出的内容要可以直接复制粘贴发朋友圈，不需要任何修改

原始语音内容：
${voiceText}`;
}

async function generate() {
  const voiceText = document.getElementById('voiceText').value.trim();
  const errorEl = document.getElementById('error');
  const btn = document.getElementById('generateBtn');

  errorEl.textContent = '';

  if (!voiceText) { errorEl.textContent = '请先粘贴语音转文字内容'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>生成中...';
  document.getElementById('outputSection').style.display = 'none';

  try {
    const res = await fetch(BASE_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2048,
        messages: [{ role: 'user', content: buildPrompt(voiceText) }]
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const text = data.content[0].text;

    document.getElementById('outputAll').textContent = text;
    document.getElementById('outputSection').style.display = 'block';
    document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth' });

  } catch (e) {
    errorEl.textContent = '出错了：' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '生成文案';
  }
}

function copyAll(btn) {
  const text = document.getElementById('outputAll').textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已复制 ✓';
    setTimeout(() => btn.textContent = '复制全部内容', 1500);
  });
}
</script>
</body>
</html>
